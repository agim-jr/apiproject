<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Movie Search</title>
</head>
<body>
  <div class="container">
    <div class="search-section">
      <h1>Search Movies</h1>
      <input type="text" id="movie-search" placeholder="Search for a movie..." />
      <button onclick="searchMovies()">Search</button>
    </div>
    <div class="filter-section" id="filter-section" style="display: none;">
      <label for="sort-filter">Sort by:</label>
      <select id="sort-filter" onchange="applySorting()">
        <option value="default">Default</option>
        <option value="a-z">Alphabetical A to Z</option>
        <option value="z-a">Alphabetical Z to A</option>
        <option value="newest">Newest to Oldest</option>
        <option value="oldest">Oldest to Newest</option>
      </select>
    </div>
    <div class="row">
      <div class="movie-list">
        <p>Search for a movie to get started!</p>
      </div>
    </div>
  </div>
  <!--The Footer section-->
  <footer>
    <div class="footer-content">
        <div class="footer-section">
            <h3>Movie Search App</h3>
            <p>The best way to discover movies</p>
        </div>
        <div class="footer-section">
          <h4>Quick Links</h4>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="https://www.omdbapi.com/" target="_blank">OMDb API</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h4>About</h4>
        <p>Powered by OMDb API</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Movie Search App. All rights reserved.</p>
    </div>
  </footer>
</body>
<script src="app.js"></script>
</html>
